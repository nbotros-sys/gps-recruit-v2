name: Nightly Backup to Dropbox

on:
  schedule:
    - cron: '0 2 * * *'   # 02:00 UTC every day
  workflow_dispatch: {}    # allows manual "Run workflow" button

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install tools (Postgres 17 client)
        run: |
          sudo mkdir -p /etc/apt/keyrings
          wget --quiet -O - https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/keyrings/pgdg.gpg
          echo "deb [signed-by=/etc/apt/keyrings/pgdg.gpg] http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17
          python3 -m pip install --quiet requests

      - name: Run backup
        env:
          BACKUP_CONFIG: ${{ secrets.BACKUP_CONFIG }}
        run: python3 backup.py
